<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#09090f">
<title>BrideWorship Remote</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Lato:wght@400;700&display=swap" rel="stylesheet">

<style>
*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
}
:root {
  --gold:  #c9a84c; --gold2: #e8c97a;
  --bg:    #09090f; --bg2:   #13131e; --bg3: #1c1c2a;
  --bdr:   rgba(255,255,255,.09);
  --green: #4caf7a; --red:   #e05050; --blue: #4a90d9;
  --text2: rgba(255,255,255,.45);
}
html, body {
  height: 100%; height: 100dvh;
  background: var(--bg);
  color: #fff;
  font-family: 'Lato', -apple-system, sans-serif;
  overflow: hidden;
}

/* ─── App shell ─── */
#app {
  display: flex; flex-direction: column;
  height: 100%; height: 100dvh;
  max-width: 480px; margin: 0 auto;
  padding-top:    max(env(safe-area-inset-top),    14px);
  padding-bottom: max(env(safe-area-inset-bottom), 14px);
  padding-left: 14px; padding-right: 14px;
}

/* ─── Connect screen ─── */
#connect-screen {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 16px; padding: 20px;
}
.hero-icon { font-size: 52px; animation: pulse 3s ease-in-out infinite; }
@keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.06);} }
.hero-title { font-family:'Cinzel',serif; font-size:18px; color:var(--gold); letter-spacing:3px; text-align:center; }
.hero-sub   { font-size:13px; color:var(--text2); text-align:center; line-height:1.65; }
.code-box {
  width:100%; max-width:224px; text-align:center;
  font-family:'Cinzel',serif; font-size:26px; letter-spacing:10px;
  padding:14px 10px;
  background:var(--bg2); border:2px solid var(--bdr); border-radius:10px;
  color:#fff; outline:none; text-transform:uppercase; transition:border-color .2s;
}
.code-box:focus { border-color:var(--gold); }
.conn-btn {
  width:100%; max-width:224px; padding:14px;
  background:var(--gold); color:#000; border:none; border-radius:10px;
  font-size:15px; font-weight:700; font-family:'Lato',sans-serif; cursor:pointer;
  transition:opacity .15s, transform .1s;
}
.conn-btn:active { opacity:.8; transform:scale(.97); }
.err-msg { font-size:12px; color:var(--red); min-height:18px; text-align:center; }

/* ─── Main remote ─── */
#main-remote { display:none; flex-direction:column; height:100%; gap:0; }

.rem-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:2px 0 6px; flex-shrink:0;
}
.rem-logo { font-family:'Cinzel',serif; font-size:12px; color:var(--gold); letter-spacing:3px; }
#status-pill {
  font-size:11px; padding:4px 12px; border-radius:20px;
  background:var(--bg2); border:1px solid var(--bdr);
  color:rgba(255,255,255,.4); transition:all .3s;
}
#status-pill.on  { background:rgba(76,175,122,.12); border-color:var(--green); color:var(--green); }
#status-pill.err { background:rgba(224,80,80,.12);  border-color:var(--red);   color:var(--red); }

/* ─── Tabs ─── */
.tabs {
  display:flex; border-bottom:1px solid var(--bdr);
  flex-shrink:0; margin-bottom:8px;
}
.tab {
  flex:1; padding:9px 4px; text-align:center;
  font-size:11px; color:rgba(255,255,255,.35);
  cursor:pointer; border-bottom:2px solid transparent;
  letter-spacing:1px; transition:all .18s;
}
.tab.on { color:var(--gold); border-bottom-color:var(--gold); }

/* ─── Tab panels ─── */
.panel { display:none; flex-direction:column; flex:1; overflow:hidden; }
.panel.on { display:flex; }

/* ─── Slide info card ─── */
.slide-card {
  background:var(--bg2); border:1px solid var(--bdr); border-radius:10px;
  padding:10px 14px; margin-bottom:8px; flex-shrink:0; min-height:58px;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px;
}
#slide-song    { font-size:10px; color:var(--gold); letter-spacing:2px; text-transform:uppercase; }
#slide-section { font-size:11px; color:rgba(255,255,255,.5); text-transform:uppercase; letter-spacing:1px; }
#slide-count   { font-size:12px; color:rgba(255,255,255,.3); }

/* ─── Buttons ─── */
.row2 { display:grid; grid-template-columns:1fr 1fr; gap:9px; flex-shrink:0; }
.row3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; flex-shrink:0; }

.rbtn {
  border:none; border-radius:11px; cursor:pointer;
  padding:13px 8px;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:5px;
  transition:transform .08s, opacity .15s;
  user-select:none; -webkit-user-select:none;
}
.rbtn:active { transform:scale(.91); opacity:.75; }
.rbtn .ic { font-size:24px; line-height:1; }
.rbtn .lb { font-size:10px; letter-spacing:1.5px; font-weight:700; font-family:'Lato',sans-serif; }

.rbtn-prev   { background:rgba(255,255,255,.07); }
.rbtn-next   { background:var(--gold); color:#000; }
.rbtn-live   { background:rgba(76,175,122,.1);  border:2px solid var(--green); }
.rbtn-live.on{ background:var(--green); color:#000; }
.rbtn-blank  { background:rgba(255,255,255,.05); border:2px solid transparent; }
.rbtn-blank.on  { background:rgba(255,255,255,.15); border-color:#fff; }
.rbtn-freeze { background:rgba(74,144,217,.08);  border:2px solid transparent; }
.rbtn-freeze.on { border-color:var(--blue); background:rgba(74,144,217,.2); }
.rbtn-logo   { background:rgba(201,168,76,.08);  border:2px solid transparent; }
.rbtn-logo.on   { border-color:var(--gold); background:rgba(201,168,76,.2); }
.rbtn-timer  { background:rgba(212,160,23,.1); border:1px solid rgba(212,160,23,.25); }

.sect-lbl {
  font-size:9px; color:rgba(255,255,255,.24); letter-spacing:2px;
  text-transform:uppercase; text-align:center; padding:6px 0 3px; flex-shrink:0;
}

/* ─── Schedule list ─── */
.sch-scroll {
  flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch;
}
.sch-scroll::-webkit-scrollbar { width:3px; }
.sch-scroll::-webkit-scrollbar-thumb { background:rgba(255,255,255,.1); border-radius:2px; }

.sch-item {
  display:flex; align-items:center; gap:10px;
  padding:11px 12px; border-radius:8px;
  cursor:pointer; margin-bottom:5px;
  background:var(--bg2); border:1px solid var(--bdr);
  transition:all .15s; user-select:none; -webkit-user-select:none;
}
.sch-item:active { transform:scale(.98); opacity:.75; }
.sch-item.cur  { border-color:var(--gold); background:rgba(201,168,76,.1); }
.sch-item.done { opacity:.38; }

.sch-item-num {
  font-size:11px; color:var(--gold); font-weight:700;
  min-width:20px; text-align:center; flex-shrink:0;
}
.sch-item-ic   { font-size:18px; flex-shrink:0; }
.sch-item-body { flex:1; min-width:0; }
.sch-item-label {
  font-size:13px; white-space:nowrap;
  overflow:hidden; text-overflow:ellipsis;
}
.sch-item-type {
  font-size:10px; color:rgba(255,255,255,.3);
  text-transform:uppercase; letter-spacing:1px; margin-top:2px;
}
.sch-live-dot {
  width:8px; height:8px; border-radius:50%; background:var(--green);
  flex-shrink:0; animation:blink 1.4s infinite;
}
@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:.25;} }

.sch-empty {
  font-size:12px; color:rgba(255,255,255,.25);
  text-align:center; padding:28px 14px; line-height:1.75;
}

/* ─── Footer row ─── */
.foot-row { margin-top:auto; padding-top:8px; flex-shrink:0; }
.disc-btn {
  width:100%; padding:10px; border-radius:8px;
  border:1px solid rgba(224,80,80,.3);
  background:transparent; color:var(--red);
  font-size:12px; cursor:pointer; font-family:'Lato',sans-serif;
  transition:background .18s;
}
.disc-btn:active { background:rgba(224,80,80,.12); }
.brand {
  font-size:9px; color:rgba(255,255,255,.15); letter-spacing:2px;
  text-align:center; padding:6px 0 0; text-transform:uppercase; flex-shrink:0;
}
</style>
</head>
<body>
<div id="app">

  <!-- ═══ CONNECT SCREEN ═══ -->
  <div id="connect-screen">
    <div class="hero-icon">📱</div>
    <div class="hero-title">BrideWorship<br>Remote</div>
    <div class="hero-sub">Enter the 6-character Room Code<br>shown on the presenter screen</div>
    <input id="code-inp" class="code-box" maxlength="6" placeholder="XXXXXX"
      autocomplete="off" autocorrect="off" spellcheck="false"
      oninput="this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g,'')">
    <button class="conn-btn" onclick="doConnect()">Connect →</button>
    <div id="err-msg" class="err-msg"></div>
  </div>

  <!-- ═══ MAIN REMOTE ═══ -->
  <div id="main-remote">

    <div class="rem-header">
      <div class="rem-logo">BW REMOTE</div>
      <div id="status-pill">Connecting…</div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <div class="tab on"  id="tab-ctrl" onclick="showTab('ctrl')">Controls</div>
      <div class="tab"     id="tab-sch"  onclick="showTab('sch')">📅 Schedule</div>
    </div>

    <!-- ═══ CONTROLS PANEL ═══ -->
    <div class="panel on" id="panel-ctrl">

      <!-- Current slide info -->
      <div class="slide-card">
        <div id="slide-song">—</div>
        <div id="slide-section"></div>
        <div id="slide-count">— / —</div>
      </div>

      <!-- Nav -->
      <div class="row2" style="margin-bottom:8px;">
        <button class="rbtn rbtn-prev" onclick="send('prev')">
          <span class="ic">◀</span><span class="lb">PREV</span>
        </button>
        <button class="rbtn rbtn-next" onclick="send('next')">
          <span class="ic">▶</span><span class="lb">NEXT</span>
        </button>
      </div>

      <div class="sect-lbl">Output</div>
      <div class="row2" style="margin-bottom:6px;">
        <button class="rbtn rbtn-live"   id="b-live"   onclick="send('live')">
          <span class="ic">📡</span><span class="lb">LIVE</span>
        </button>
        <button class="rbtn rbtn-blank"  id="b-blank"  onclick="send('blank')">
          <span class="ic">■</span><span class="lb">BLANK</span>
        </button>
      </div>
      <div class="row2" style="margin-bottom:8px;">
        <button class="rbtn rbtn-freeze" id="b-freeze" onclick="send('freeze')">
          <span class="ic">❄</span><span class="lb">FREEZE</span>
        </button>
        <button class="rbtn rbtn-logo"   id="b-logo"   onclick="send('logo')">
          <span class="ic">◈</span><span class="lb">LOGO</span>
        </button>
      </div>

      <div class="sect-lbl">Timer</div>
      <div class="row3" style="margin-bottom:6px;">
        <button class="rbtn rbtn-timer" onclick="send('timer_start')">
          <span class="ic">▶</span><span class="lb">START</span>
        </button>
        <button class="rbtn rbtn-timer" onclick="send('timer_pause')">
          <span class="ic">⏸</span><span class="lb">PAUSE</span>
        </button>
        <button class="rbtn rbtn-timer" onclick="send('timer_reset')">
          <span class="ic">↺</span><span class="lb">RESET</span>
        </button>
      </div>

      <div class="foot-row">
        <button class="disc-btn" onclick="doDisconnect()">✕ Disconnect</button>
      </div>
      <div class="brand">BrideWorship Pro</div>
    </div>

    <!-- ═══ SCHEDULE PANEL ═══ -->
    <div class="panel" id="panel-sch">
      <div class="sch-scroll" id="sch-list-remote">
        <div class="sch-empty">
          No schedule loaded yet.<br>
          Build a schedule on the presenter screen<br>
          and it will appear here in real-time.
        </div>
      </div>
      <div class="foot-row">
        <button class="disc-btn" onclick="doDisconnect()">✕ Disconnect</button>
      </div>
      <div class="brand">BrideWorship Pro</div>
    </div>

  </div><!-- #main-remote -->

</div><!-- #app -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.4/peerjs.min.js"></script>
<script>
(function () {
  'use strict';

  const TYPE_ICONS = {
    song:'🎵', scripture:'📖', sermon:'🎤', announcement:'📢',
    media:'🖼', timer:'⏱', blank:'⬛', logo:'◈'
  };

  let peer = null, conn = null;

  /* ── Pre-fill code from URL ?code= or fallback to hash ── */
  function getUrlCode() {
    return (new URLSearchParams(window.location.search).get('code') || '').toUpperCase().substring(0, 6);
  }

  const prefill = getUrlCode();
  if (prefill) {
    document.getElementById('code-inp').value = prefill;
    window.addEventListener('load', () => setTimeout(doConnect, 700));
  }

  /* ── Connection ── */
  window.doConnect = function () {
    const c = document.getElementById('code-inp').value.trim().toUpperCase();
    if (c.length < 6) { showErr('Please enter the full 6-character code'); return; }
    showErr('');
    setPill('Connecting…', false, false);

    peer = new Peer({
      config: {
        iceServers: [
          { urls: 'stun:stun.l.google.com:19302' },
          { urls: 'stun:stun1.l.google.com:19302' },
        ]
      }
    });

    peer.on('open', () => {
      conn = peer.connect('bw-remote-' + c.toLowerCase(), { reliable: true, serialization: 'json' });

      conn.on('open', () => {
        document.getElementById('connect-screen').style.display = 'none';
        document.getElementById('main-remote').style.display    = 'flex';
        setPill('● Connected', true, false);
        setInterval(() => { if (conn && conn.open) conn.send({ cmd: 'ping' }); }, 5000);
      });

      conn.on('data', d => {
        if (d && d.type === 'state') applyState(d);
      });

      conn.on('close', () => setPill('Disconnected', false, true));

      conn.on('error', e => { showErr('Connection error'); console.error(e); });
    });

    peer.on('error', e => {
      const msg = e.type === 'peer-unavailable'
        ? 'Room not found — check the code or ask presenter to restart remote'
        : 'Network error: ' + e.type;
      showErr(msg);
      setPill('Error', false, true);
    });
  };

  window.send = function (cmd, extra) {
    if (conn && conn.open) conn.send(Object.assign({ cmd }, extra || {}));
  };

  window.showTab = function (name) {
    ['ctrl', 'sch'].forEach(t => {
      document.getElementById('tab-' + t).classList.toggle('on', t === name);
      document.getElementById('panel-' + t).classList.toggle('on', t === name);
    });
  };

  window.doDisconnect = function () {
    conn && conn.close();
    peer && peer.destroy();
    conn = null; peer = null;

    document.getElementById('connect-screen').style.display = 'flex';
    document.getElementById('main-remote').style.display    = 'none';
    setPill('Connecting…', false, false);
    showErr('');
    resetSlideCard();
    ['b-live', 'b-blank', 'b-freeze', 'b-logo'].forEach(id =>
      document.getElementById(id)?.classList.remove('on')
    );
    renderSchList([], -1);
  };

  /* ── Apply state broadcast from main app ── */
  function applyState(s) {
    tog('b-live',   s.live);
    tog('b-blank',  s.blanked);
    tog('b-freeze', s.frozen);
    tog('b-logo',   s.logo);

    const songEl = document.getElementById('slide-song');
    const secEl  = document.getElementById('slide-section');
    const cntEl  = document.getElementById('slide-count');

    if (songEl) songEl.textContent = s.song || (s.section ? '' : '—');
    if (secEl)  secEl.textContent  = s.section || '';
    if (cntEl)  cntEl.textContent  = s.total > 0 ? (s.cur + 1) + ' / ' + s.total : '— / —';

    if (Array.isArray(s.schItems)) renderSchList(s.schItems, s.schCur);
  }

  /* ── Render the schedule list ── */
  function renderSchList(items, curIdx) {
    const list = document.getElementById('sch-list-remote');
    if (!list) return;

    if (!items.length) {
      list.innerHTML = `
        <div class="sch-empty">
          Schedule is empty.<br>
          Add items on the presenter screen<br>
          and they'll appear here instantly.
        </div>`;
      return;
    }

    list.innerHTML = items.map(it => {
      const isCur  = it.i === curIdx;
      const isDone = it.done && !isCur;
      const icon   = TYPE_ICONS[it.type] || '📌';
      return `
        <div class="sch-item${isCur ? ' cur' : ''}${isDone ? ' done' : ''}"
             onclick="send('sch_project', { idx: ${it.i} })">
          <div class="sch-item-num">${it.i + 1}</div>
          <div class="sch-item-ic">${icon}</div>
          <div class="sch-item-body">
            <div class="sch-item-label">${esc(it.label)}</div>
            <div class="sch-item-type">${esc(it.type)}</div>
          </div>
          ${isCur ? '<div class="sch-live-dot"></div>' : ''}
        </div>`;
    }).join('');

    // Auto-scroll to active item
    const active = list.querySelector('.cur');
    if (active) active.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }

  function resetSlideCard() {
    document.getElementById('slide-song').textContent    = '—';
    document.getElementById('slide-section').textContent = '';
    document.getElementById('slide-count').textContent   = '— / —';
  }

  function tog(id, on) {
    document.getElementById(id)?.classList.toggle('on', !!on);
  }

  function setPill(msg, on, err) {
    const el = document.getElementById('status-pill');
    el.textContent = msg;
    el.className   = on ? 'on' : (err ? 'err' : '');
  }

  function showErr(msg) {
    document.getElementById('err-msg').textContent = msg;
  }

  function esc(s) {
    return String(s || '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

})();
</script>
</body>
</html>
